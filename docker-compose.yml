services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: app
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  node:
    image: node:20
    container_name: node
    ports:
      - "5173:5173"
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "tail -f /dev/null"

  mailpit:
      image: axllent/mailpit
      container_name: ld_mailpit
      ports:
        - "1025:1025" 
        - "8025:8025" 

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata: